// --------------------------
// PENGATURAN SISTEM
// --------------------------
const JUMLAH_SOAL_TAMPIL = 15;   // Ambil 15 soal acak
const NAIK_PER_SOAL = 100 / JUMLAH_SOAL_TAMPIL; // +6,67% per benar
const TURUN_SALAH = 2;           // -2% per salah

let soalTerpilih = [];
let progres = 0;
let nomorSoal = 0;

// --------------------------
// FUNGSI ACAK SOAL
// --------------------------
function acakSoal() {
  const salin = [...daftarSoal];
  const hasil = [];
  for (let i = 0; i < JUMLAH_SOAL_TAMPIL; i++) {
    const posisi = Math.floor(Math.random() * salin.length);
    hasil.push(salin.splice(posisi, 1)[0]);
  }
  return hasil;
}

// --------------------------
// TAMPILKAN SOAL
// --------------------------
function tampilkanSoal() {
  if (nomorSoal >= soalTerpilih.length) {
    tampilkanHasil();
    return;
  }

  const soal = soalTerpilih[nomorSoal];
  document.getElementById("teksSoal").textContent = `${nomorSoal + 1}. ${soal.soal}`;

  const wadah = document.getElementById("daftarPilihan");
  wadah.innerHTML = "";

  soal.pilihan.forEach((opsi, indeks) => {
    const tombol = document.createElement("button");
    tombol.className = "tombol-pilih";
    tombol.textContent = opsi;
    tombol.onclick = () => cekJawaban(indeks);
    wadah.appendChild(tombol);
  });
}

// --------------------------
// CEK JAWABAN
// --------------------------
function cekJawaban(pilihanPengguna) {
  const soal = soalTerpilih[nomorSoal];
  const semuaTombol = document.querySelectorAll(".tombol-pilih");
  semuaTombol.forEach(btn => btn.disabled = true);

  if (pilihanPengguna === soal.jawaban) {
    semuaTombol[pilihanPengguna].classList.add("benar");
    progres = Math.min(progres + NAIK_PER_SOAL, 100);
  } else {
    semuaTombol[pilihanPengguna].classList.add("salah");
    semuaTombol[soal.jawaban].classList.add("benar");
    progres = Math.max(progres - TURUN_SALAH, 0);
  }

  perbaruiProgres();

  setTimeout(() => {
    nomorSoal++;
    tampilkanSoal();
  }, 1000);
}

// --------------------------
// PERBARUI TAMPILAN PROGRES
// --------------------------
function perbaruiProgres() {
  document.getElementById("progresBar").style.width = `${progres.toFixed(1)}%`;
  document.getElementById("progresTeks").textContent = `${progres.toFixed(1)}%`;
}

// --------------------------
// TAMPILKAN HASIL AKHIR
// --------------------------
function tampilkanHasil() {
  document.getElementById("kotakSoal").style.display = "none";
  document.getElementById("hasilAkhir").style.display = "block";
  document.getElementById("nilaiAkhir").textContent = `${progres.toFixed(1)}%`;

  if (progres >= 90) document.getElementById("pesanHasil").textContent = "Sempurna! Siap buat kode 🔥";
  else if (progres >= 75) document.getElementById("pesanHasil").textContent = "Bagus! Paham dasar-dasarnya 👍";
  else if (progres >= 50) document.getElementById("pesanHasil").textContent = "Cukup baik, latihan lagi ya 😊";
  else document.getElementById("pesanHasil").textContent = "Semangat! Pelajari lagi materinya 💪";
}

// --------------------------
// MULAI / ULANG KUIS
// --------------------------
function mulaiUlang() {
  soalTerpilih = acakSoal();
  progres = 0;
  nomorSoal = 0;
  document.getElementById("kotakSoal").style.display = "block";
  document.getElementById("hasilAkhir").style.display = "none";
  perbaruiProgres();
  tampilkanSoal();
}

// Jalankan saat halaman dibuka
mulaiUlang();
